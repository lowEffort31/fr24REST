<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FR24 REST API - Interactive Documentation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --bg: #0b0f1a;
            --sidebar-bg: #111827;
            --card-bg: rgba(31, 41, 55, 0.5);
            --border: rgba(75, 85, 99, 0.3);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --method-get: #10b981;
            --method-post: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        aside {
            width: 300px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-section {
            margin-bottom: 2rem;
        }

        .nav-section h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
        }

        .nav-item:hover { background: rgba(255, 255, 255, 0.05); }
        .nav-item.active { background: var(--primary); color: white; }

        .method-badge {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            min-width: 40px;
            text-align: center;
        }

        .badge-get { background: rgba(16, 185, 129, 0.1); color: var(--method-get); border: 1px solid var(--method-get); }
        .badge-post { background: rgba(245, 158, 11, 0.1); color: var(--method-post); border: 1px solid var(--method-post); }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 3rem;
        }

        .endpoint-header {
            margin-bottom: 2rem;
        }

        .endpoint-url {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        /* Work Area */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
            flex: 1;
        }

        .params-panel, .result-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-body { padding: 1.5rem; flex: 1; overflow-y: auto; }

        /* Form Elements */
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        input, select {
            width: 100%;
            background: #1f2937;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.75rem;
            color: white;
            font-family: inherit;
        }

        .btn-execute {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: filter 0.2s;
        }

        .btn-execute:hover { filter: brightness(1.2); }

        /* Code Mirror Style Output */
        #json-output {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #d1d5db;
            white-space: pre-wrap;
            tab-size: 2;
        }

        .loading-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .workspace { animation: fadeIn 0.4s ease-out; }
    </style>
</head>
<body>
    <aside>
        <div class="logo">
            <span>✈️</span> FR24 REST API
        </div>

        <div class="nav-section">
            <h3>Feed Endpoints</h3>
            <div class="nav-item active" onclick="loadEndpoint('flights')">
                <span class="method-badge badge-get">GET</span>
                <span>Live Feed</span>
            </div>
            <div class="nav-item" onclick="loadEndpoint('zones')">
                <span class="method-badge badge-get">GET</span>
                <span>Active Zones</span>
            </div>
            <div class="nav-item" onclick="loadEndpoint('airlines')">
                <span class="method-badge badge-get">GET</span>
                <span>Airlines</span>
            </div>
        </div>

        <div class="nav-section">
            <h3>Intelligence</h3>
            <div class="nav-item" onclick="loadEndpoint('details')">
                <span class="method-badge badge-get">GET</span>
                <span>Flight Details</span>
            </div>
            <div class="nav-item" onclick="loadEndpoint('airport')">
                <span class="method-badge badge-get">GET</span>
                <span>Airport Info</span>
            </div>
            <div class="nav-item" onclick="loadEndpoint('login')">
                <span class="method-badge badge-post">POST</span>
                <span>Authentication</span>
            </div>
        </div>
    </aside>

    <main id="app">
        <!-- Dyn. Content -->
        <div id="content-area"></div>
    </main>

    <script>
        const endpoints = {
            flights: {
                title: 'Live Flight Feed',
                desc: 'Retrieve current flights based on zone, airline, or custom bounds.',
                url: '/api/flights',
                fields: [
                    { id: 'zone', label: 'Region', type: 'select', options: ['europe', 'northamerica', 'southamerica', 'oceania', 'asia', 'africa'], default: 'europe' },
                    { id: 'airline', label: 'Airline ICAO (Optional)', type: 'text', placeholder: 'e.g. DLH' }
                ]
            },
            details: {
                title: 'Flight Intelligence',
                desc: 'Global lookup for detailed aircraft state, photos, and historical path.',
                url: '/api/flight/:code',
                fields: [
                    { id: 'code', label: 'Flight Number or ID', type: 'text', default: 'LH400' },
                    { id: 'full', label: 'Full Data Mode', type: 'checkbox' },
                    { id: 'photos', label: 'Include Photos', type: 'checkbox', default: true },
                    { id: 'trail', label: 'Include Path Trail', type: 'checkbox', default: true }
                ]
            },
            airport: {
                title: 'Airport Operations',
                desc: 'Detailed metadata and operational status for an airport.',
                url: '/api/airports/:code',
                fields: [
                    { id: 'code', label: 'IATA Code', type: 'text', default: 'FRA' },
                    { id: 'weather', label: 'Include Weather', type: 'checkbox' },
                    { id: 'schedule', label: 'Include Schedules', type: 'checkbox' },
                    { id: 'runways', label: 'Include Runways', type: 'checkbox' },
                    { id: 'aircraftCount', label: 'Include Aircraft Count', type: 'checkbox' }
                ]
            },
            zones: { title: 'Geographical Zones', desc: 'Active world region coordinate boundaries.', url: '/api/zones', fields: [] },
            airlines: { title: 'Airline Directory', desc: 'Official list of tracked carriers.', url: '/api/airlines', fields: [] },
            login: {
                title: 'Native Authentication',
                desc: 'Obtain session cookies for premium data fields.',
                url: '/api/login',
                fields: [
                    { id: 'email', label: 'FR24 Email', type: 'text' },
                    { id: 'password', label: 'Password', type: 'password' }
                ]
            }
        };

        function loadEndpoint(key) {
            const config = endpoints[key];
            const items = document.querySelectorAll('.nav-item');
            items.forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');

            const html = `
                <div class="endpoint-header">
                    <h2>${config.title}</h2>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">${config.desc}</p>
                    <div class="endpoint-url">
                        <span class="method-badge badge-${config.url.startsWith('/api/login') ? 'post' : 'get'}">${config.url.startsWith('/api/login') ? 'POST' : 'GET'}</span>
                        <span>${config.url}</span>
                    </div>
                </div>

                <div class="workspace">
                    <div class="params-panel">
                        <div class="panel-header">Parameters</div>
                        <div class="panel-body">
                            ${config.fields.map(f => `
                                <div class="form-group">
                                    <label>${f.label}</label>
                                    ${f.type === 'select' ? `
                                        <select id="param-${f.id}">
                                            ${f.options.map(o => `<option value="${o}">${o}</option>`).join('')}
                                        </select>
                                    ` : f.type === 'checkbox' ? `
                                        <input type="checkbox" id="param-${f.id}" ${f.default ? 'checked' : ''} style="width: auto;">
                                    ` : `
                                        <input type="${f.type}" id="param-${f.id}" value="${f.default || ''}" placeholder="${f.placeholder || ''}">
                                    `}
                                </div>
                            `).join('')}
                            <button class="btn-execute" onclick="execute('${key}')">Send Request</button>
                        </div>
                    </div>
                    <div class="result-panel">
                        <div class="panel-header">
                            Response
                            <div id="loader" class="loading-spinner"></div>
                        </div>
                        <div class="panel-body">
                            <pre id="json-output">// Execute a request to see results...</pre>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('content-area').innerHTML = html;
        }

        async function execute(key) {
            const config = endpoints[key];
            const output = document.getElementById('json-output');
            const loader = document.getElementById('loader');
            
            let url = config.url;
            let body = null;
            let method = url.startsWith('/api/login') ? 'POST' : 'GET';

            loader.style.display = 'block';
            output.innerText = '// Fetching...';

            // Path & Query params
            const queryParams = new URLSearchParams();
            config.fields.forEach(f => {
                const el = document.getElementById(`param-${f.id}`);
                const val = f.type === 'checkbox' ? el.checked : el.value;
                
                if (url.includes(`:${f.id}`)) {
                    url = url.replace(`:${f.id}`, encodeURIComponent(val));
                } else if (method === 'GET' && val) {
                    queryParams.append(f.id, val);
                } else if (method === 'POST') {
                    if (!body) body = {};
                    body[f.id] = val;
                }
            });

            const finalUrl = queryParams.toString() ? `${url}?${queryParams.toString()}` : url;

            try {
                const res = await fetch(finalUrl, {
                    method,
                    headers: body ? { 'Content-Type': 'application/json' } : {},
                    body: body ? JSON.stringify(body) : null
                });
                const data = await res.json();
                output.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                output.innerText = `Error: ${err.message}`;
            } finally {
                loader.style.display = 'none';
            }
        }

        // Init
        window.onload = () => loadEndpoint('flights');
    </script>
</body>
</html>
